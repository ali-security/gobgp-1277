language: go

_dep_ensure: &_dep_ensure
  go: "1.11"
  before_install: go install github.com/golang/dep/cmd/dep@latest
  install: $GOPATH/bin/dep ensure

_unittest: &_unittest
  <<: *_dep_ensure
  script:
    - go test $([ $(go env GOARCH) == 'amd64' ] && echo '-race') $(go list ./... | grep -v '/vendor/') -timeout 120s
    - if [ "$(go env GOARCH)" = "amd64" ]; then go test -race github.com/osrg/gobgp/pkg/packet/bgp -run ^Test_RaceCondition$; else echo 'skip'; fi

_build: &_build
  <<: *_dep_ensure
  script:
    - go build -o ./cmd/gobgp/gobgp   ./cmd/gobgp/
    - go build -o ./cmd/gobgpd/gobgpd ./cmd/gobgpd/

_python: &_python
  language: generic
  before_install:
    - git clone https://github.com/pyenv/pyenv.git ~/.pyenv
    - export PYENV_ROOT="$HOME/.pyenv"
    - export PATH="$PYENV_ROOT/bin:$PATH"
    - eval "$(pyenv init --path)"
    - eval "$(pyenv init -)"
    - pyenv install 2.7.18
    - pyenv global 2.7.18

_docker: &_docker
  <<: *_python
  sudo: required
  dist: trusty
  group: deprecated-2017Q4
  before_install:
    - git clone https://github.com/pyenv/pyenv.git ~/.pyenv
    - export PYENV_ROOT="$HOME/.pyenv"
    - export PATH="$PYENV_ROOT/bin:$PATH"
    - eval "$(pyenv init --path)"
    - eval "$(pyenv init -)"
    - pyenv install 2.7.18
    - pyenv global 2.7.18
    - pip install --upgrade pip
    - test $TRAVIS_OS_NAME == "linux" && sudo sysctl -w net.ipv6.conf.all.disable_ipv6=0
    - test $TRAVIS_OS_NAME == "linux" && sudo sysctl -w net.ipv6.conf.default.disable_ipv6=0
    - test $TRAVIS_OS_NAME == "linux" && sudo sysctl -w net.ipv6.conf.docker0.disable_ipv6=1
  install:
    - pip install -r test/pip-requires.txt
    - fab -f test/lib/base.py make_gobgp_ctn:tag=$DOCKER_IMAGE,from_image=$FROM_IMAGE
  script:
    - PYTHONPATH=test python test/scenario_test/$TEST --gobgp-image $DOCKER_IMAGE -x -s
  services:
    - docker

env:
  global:
    - DOCKER_IMAGE=gobgp
    - FROM_IMAGE=osrg/quagga

matrix:
  fast_finish: false
  allow_failures:
    - go: tip

  include:
#
# Unit Tests
#
    - <<: *_unittest
      env:
        - DESCRIPTION="Unit Tests Tip"
      go: tip
    - <<: *_unittest
      env:
        - DESCRIPTION="Unit Tests"
      go: 1.11
    - <<: *_unittest
      env:
        - DESCRIPTION="Tests + goreleaser + cover"
      go: "1.11"
      script:
        - go test $(go list ./... | grep -v '/vendor/') -coverprofile=coverage.txt -covermode=atomic
      after_success:
        - test -n "$TRAVIS_TAG" && curl -sL https://git.io/goreleaser | bash
        - bash <(curl -s https://codecov.io/bash)
    - <<: *_unittest
      env:
        - DESCRIPTION="Unit Tests on i386"
      before_script:
        - export GOARCH="386"
        - go env

#
# Cross-compile
#
# Note: We use "before_script" to enable "go env" settings. The following keeps
# "env" sections as just markers of Travis-CI Web UI.
# See https://github.com/travis-ci/travis-ci/issues/6126
    - <<: *_build
      env:
        - GOOS="openbsd"
      before_script:
        - export GOOS="openbsd"
        - go env
    - <<: *_build
      env:
        - GOOS="freebsd"
      before_script:
        - export GOOS="freebsd"
        - go env
    - <<: *_build
      env:
        - GOOS="darwin"
      before_script:
        - export GOOS="darwin"
        - go env
